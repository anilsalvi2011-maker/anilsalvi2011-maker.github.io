<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anil Salvi | Developer Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:#0f172a;
  color:white;
  overflow-x:hidden;
}

/* ===== INTRO ===== */

#intro-overlay{
  position:fixed;
  inset:0;
  background:#000814;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
  transition:opacity 1s ease;
}

#intro-logo{
  width:220px;
  height:220px;
  border-radius:50%;
  border:5px solid #facc15;
  transition:all 1.8s cubic-bezier(.77,0,.18,1);
}

/* ===== NAVBAR ===== */

nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 8%;
  background:rgba(8,21,43,0.95);
  backdrop-filter:blur(10px);
}

.logo{
  width:60px;
  height:60px;
  position:relative;
}

.logo img{
  width:60px;
  height:60px;
  border-radius:50%;
  border:3px solid #facc15;
  opacity:0; /* hidden initially */
}

nav ul{
  display:flex;
  list-style:none;
  gap:15px;
  flex-wrap:wrap;
}

nav ul li a{
  text-decoration:none;
  color:white;
  padding:8px 18px;
  border-radius:30px;
  border:1px solid rgba(250,204,21,0.4);
  transition:all 0.3s ease;
  font-weight:500;
  cursor:pointer;
}

nav ul li a:hover{
  background:#facc15;
  color:#08152b;
  box-shadow:0 0 15px rgba(250,204,21,0.6);
}

.active-nav{
  background:#facc15;
  color:#08152b !important;
}

/* HERO */
.hero{
  text-align:center;
  padding:60px 20px;
}

.hero h1{
  font-size:40px;
}

.highlight{
  color:#facc15;
}

.typing{
  font-size:18px;
  margin-top:10px;
  height:25px;
}

.hero img{
  width:200px;
  height:200px;
  border-radius:50%;
  object-fit:cover;
  margin-top:30px;
  border:5px solid #facc15;
}

.content{
  display:none;
  padding:50px 10%;
  text-align:center;
}

.content.active{
  display:block;
}

.card{
  background:#1e293b;
  padding:25px;
  border-radius:18px;
  margin-bottom:25px;
  border:1px solid rgba(250,204,21,0.3);
}

footer{
  text-align:center;
  padding:30px;
  opacity:0.7;
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro-overlay">
  <img src="logo.png" id="intro-logo">
</div>

<!-- NAVBAR -->
<nav>
  <div class="logo">
    <img src="logo.png" id="nav-logo">
  </div>
  <ul>
    <li><a onclick="showSection('about', this)">About</a></li>
    <li><a onclick="showSection('skills', this)">Skills</a></li>
    <li><a onclick="showSection('experience', this)">Experience</a></li>
    <li><a onclick="showSection('education', this)">Education</a></li>
    <li><a onclick="showSection('achievements', this)">Achievements</a></li>
  </ul>
</nav>

<section class="hero">
  <h1>Hello, I'm <span class="highlight">Anil Salvi</span></h1>
  <div class="typing" id="typing"></div>
  <img src="Myphoto.png">
</section>

<footer>
© 2026 Anil Salvi | All Rights Reserved
</footer>

<script>

/* ===== STABLE AMAZON INTRO ===== */

window.onload = function(){

  const intro = document.getElementById("intro-logo");
  const navLogo = document.getElementById("nav-logo");

  // Step 1: Move intro logo to top-left area (where navbar logo is)
  setTimeout(() => {
    intro.style.transform = "translate(-42vw, -40vh) scale(0.27)";
    intro.style.borderWidth = "3px";
  }, 800);

  // Step 2: Fade overlay
  setTimeout(() => {
    document.getElementById("intro-overlay").style.opacity = "0";
  }, 2600);

  // Step 3: Remove overlay and reveal navbar logo
  setTimeout(() => {
    document.getElementById("intro-overlay").style.display = "none";
    navLogo.style.opacity = "1";
  }, 3600);

};

</script>

</body>
</html>
